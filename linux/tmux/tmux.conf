# ~/.tmux.conf — managed by dotfiles repo
# Tuned for multi-agent workflows (Claude Code, long-running tasks,
# SSH'd sessions). Read top-to-bottom; comments explain choices.

# ===== Prefix =================================================================
# Default Ctrl-b is awkward; Ctrl-a is the screen/standard choice. Free up the
# default by unbinding it.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== Sensible defaults ======================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true-color (24-bit)
set -g mouse on                              # scroll, resize, click panes
set -g history-limit 100000                  # long scrollback for agent output
set -g base-index 1                          # windows start at 1, not 0
setw -g pane-base-index 1                    # panes too
set -g renumber-windows on                   # close window 2, others renumber
set -g escape-time 10                        # responsive ESC in vim/neovim
set -g focus-events on                       # let editors notice focus changes
set -g status-interval 5                     # refresh status line every 5s

# ===== Splits and navigation =================================================
# Visual splits: `|` horizontal, `-` vertical (way easier to remember than the
# defaults `%` and `"`).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also open in the current path.
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation: prefix h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+arrows (no prefix needed)
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up    resize-pane -U 3
bind -n S-Down  resize-pane -D 3

# ===== Multi-agent helpers ====================================================
# Toggle synchronized input across all panes in the current window.
# Useful when you want to send the same command to several agents at once
# (e.g. `git status` across 4 worktrees).
bind S setw synchronize-panes \; display "Sync panes: #{?pane_synchronized,ON,OFF}"

# Quick window/session navigation
bind -n M-Left  previous-window      # Alt+Left
bind -n M-Right next-window          # Alt+Right
bind Tab last-window                 # prefix + Tab toggles last window

# Quickly broadcast a "are you done?" check to the current pane
# (handy when an agent might be waiting for input).
bind y send-keys -t . "" Enter

# ===== Copy mode (vi-style) ===================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# ===== Reload config ==========================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ===== Status line ============================================================
# Minimal, readable. Shows session name on the left, host + clock on the right.
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[bold,fg=cyan][#S]#[default] "
set -g status-right "#[fg=yellow]#h #[fg=white]| %Y-%m-%d %H:%M"
set -g window-status-current-style "bold,fg=black,bg=cyan"
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "

# Pane border highlight — easy to see which pane is active in a busy layout.
set -g pane-border-style        "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# ===== Plugins (managed by TPM) ==============================================
# Install with: prefix + I (capital i) on first start.
# tmux-resurrect:   prefix + Ctrl-s to save, prefix + Ctrl-r to restore.
# tmux-continuum:   auto-saves every 15 minutes. Combined with resurrect,
#                   your sessions survive reboots.
# tmux-yank:        copy to system clipboard with `y` in copy mode.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Keep this line at the very bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
